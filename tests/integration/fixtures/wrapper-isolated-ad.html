<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Fixture — Wrapper-Isolated Ad Links</title>
  <style>
    body { margin: 0; font-family: sans-serif; padding: 24px; }
    .content { max-width: 800px; margin: 0 auto; }
    .ad-container {
      margin: 20px 0; padding: 16px;
      border: 1px solid #ddd; border-radius: 8px;
    }
    .fake-download-btn {
      display: inline-block; padding: 14px 32px;
      background: #43A047; color: white; text-decoration: none;
      border-radius: 4px; font-size: 18px; cursor: pointer;
    }
    .real-download {
      display: inline-block; padding: 12px 24px;
      background: #1976D2; color: white; text-decoration: none;
      border-radius: 4px; font-size: 16px;
    }
  </style>
</head>
<body>
<div class="content">
  <h1>Download SuperApp v3.2.1</h1>
  <p>Your file is ready for download.</p>

  <!-- Ad link is sole child of wrapper div — no siblings, no bare
       text nodes in parent. Nearby context ("Download SuperApp",
       "Your file is ready") is in sibling elements of the wrapper. -->
  <div class="ad-container" data-ad-slot="banner-1">
    <a class="fake-download-btn"
       href="https://ad-network.example.com/click?id=1"
       target="_blank">
      Download Now
    </a>
  </div>

  <!-- Same pattern but with a sibling span label INSIDE the wrapper -->
  <div class="ad-container" data-ad-slot="banner-2">
    <span style="font-size:10px;color:#999;">Advertisement</span>
    <a class="fake-download-btn"
       href="https://ad-network.example.com/click?id=2"
       target="_blank">
      Download Now
    </a>
  </div>

  <!-- Same pattern but label is OUTSIDE the wrapper as a sibling -->
  <span style="font-size:10px;color:#999;display:block;">Advertisement</span>
  <div class="ad-container" data-ad-slot="banner-3">
    <a class="fake-download-btn"
       href="https://ad-network.example.com/click?id=3"
       target="_blank">
      Download Now
    </a>
  </div>

  <a class="real-download" href="/files/superapp-3.2.1.apk" download>
    Download APK (24.1 MB)
  </a>
</div>
</body>
</html>
